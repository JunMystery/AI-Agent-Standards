# AI Code Audit — SAST Quality Gate
#
# Automatically scans AI-assisted code for security vulnerabilities
# and technical debt before merge. Blocks PRs with High/Critical issues.
#
# Required GitHub Secrets:
#   SONAR_TOKEN  — SonarCloud authentication token
#                  (Settings → Secrets → Actions → New repository secret)
#                  Generate at: https://sonarcloud.io/account/security
#
# Required SonarCloud Setup:
#   1. Import repo at https://sonarcloud.io
#   2. Note your Organization Key and Project Key
#   3. Update the sonar vars below

name: AI Code Audit — SAST Gate

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"

# Cancel in-progress runs for the same PR
concurrency:
  group: ai-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sast-scan:
    name: SonarCloud SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for SonarCloud blame data

      # ── SonarCloud Analysis ──
      # Runs static analysis for: security vulnerabilities, code smells,
      # bugs, and technical debt. Results visible at sonarcloud.io.
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          # GITHUB_TOKEN is auto-provided by GitHub Actions
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SONAR_TOKEN must be added as a repository secret
          # Generate at: https://sonarcloud.io/account/security
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=YOUR_ORG_KEY
            -Dsonar.projectKey=YOUR_PROJECT_KEY
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/vendor/**,**/*.test.*,**/tests/**

      # ── Quality Gate Check ──
      # Blocks the PR if SonarCloud Quality Gate fails.
      # Default gate: 0 new Critical/High vulnerabilities, 0 new bugs,
      # coverage >= 80% on new code, duplication <= 3%.
      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Dependency Vulnerability Scan ──
  # Checks for known CVEs in project dependencies.
  dependency-scan:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node.js projects
      - name: npm audit (if package.json exists)
        if: hashFiles('package.json') != ''
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high
        continue-on-error: false

      # Python projects
      - name: pip audit (if requirements.txt exists)
        if: hashFiles('requirements.txt') != ''
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc --fix --dry-run
        continue-on-error: false

  # ── AI-Assisted PR Validation ──
  # Extra checks when PR is labeled AI-Assisted.
  ai-assisted-check:
    name: AI-Assisted Code Validation
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'AI-Assisted')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Check for hardcoded secrets in the diff
      - name: Scan for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets in PR diff..."
          VIOLATIONS=$(git diff origin/${{ github.base_ref }}...HEAD -- . \
            | grep -iE "(api_key|apikey|secret|password|token|private_key)\s*[:=]\s*['\"][^'\"]+['\"]" \
            | grep -v "\.example\|\.template\|\.md\|test" || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "::error::BLOCKED — Hardcoded secrets detected in AI-generated code:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No hardcoded secrets found."

      # Verify Self-Check report exists in PR body or commits
      - name: Verify Self-Check Report
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          if echo "$PR_BODY" | grep -qi "self-check"; then
            echo "Self-Check report found in PR description."
          else
            echo "::warning::Self-Check report not found in PR description. Ensure AI output includes a Self-Check report."
          fi

      # Enforce minimum 2 reviewers for AI-Assisted PRs
      - name: Require 2 reviewers
        run: |
          echo "::notice::This PR is labeled AI-Assisted. Requires 2 reviewer approvals before merge."

  # ── Final Gate Summary ──
  gate-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [sast-scan, dependency-scan]
    if: always()

    steps:
      - name: Evaluate gate status
        run: |
          if [ "${{ needs.sast-scan.result }}" == "failure" ] || \
             [ "${{ needs.dependency-scan.result }}" == "failure" ]; then
            echo "::error::QUALITY GATE FAILED — PR blocked. Fix security issues before merge."
            exit 1
          fi
          echo "All quality gates passed. PR ready for human review."
